name: Deploy papaoleo-coleta

on:
  push:
    branches:
      - main 

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm' 

      - name: Install dependencies
        run: npm ci

      - name: Build project Astro
        run: npm run build
        env:
          FAQ_SHEETS_URL: ${{ secrets.FAQ_SHEETS_URL }}
          PUBLIC_GOOGLE_SHEETS_URL: ${{ secrets.PUBLIC_GOOGLE_SHEETS_URL }}
          PUBLIC_WHATSAPP_NUMBER: ${{ secrets.PUBLIC_WHATSAPP_NUMBER }}
          

      - name: Publish on Cloudflare Pages
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: 'papaoleo-coleta'
          directory: 'dist'